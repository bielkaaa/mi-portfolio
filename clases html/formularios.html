<!DOCTYPE html>
<html>
<head>
    <title>forms</title>
</head>
<body>
    <!--tipos de input, letra en amarillo son atributos cada uno con diferentes funciones-->
    <form>
        <h3>indique su nombre de usuario</h3>
        <input type="text" required name="username" placeholder="Introduxca su nombre de usuario"><!--place holder es texto adentro del cuadrado y name identificador-->
        <h3>indique su email</h3>
        <input type="email" required> <!--required completar si o si-->
        <h3>indique su contrasenia</h3>
        <input type="password">
        <input type="checkbox">
        <input type="radio">
        <input type="file">
        ponga su fecha de nacimiento
        <input type="date">
        <input type="submit" value="enviar formulario">
    </form>
</body>
</html>
