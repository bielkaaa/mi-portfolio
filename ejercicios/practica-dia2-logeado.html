<!DOCTYPE html>
<html>
<head>
    <title>pagina de login</title>
</head>
<body>
    <h1>Login</h1>
        <form>
    <h3 class="importante">Indique su nombre de usuario para logearse en el Juego</h3>
        <input type="text" required placeholder="Usuario" name="username">
        <br>
        <input type="email" required placeholder="Email" name="email">
        <br>
        <input type="password" required placeholder="Introduzca su contraseña">
        <br>
        <input type="date" required placeholder="Fecha de nacimiento">
        <br>
        <input type="submit" value="Enviar Formulario">
        <br>
    </form>
</body>
</html>
